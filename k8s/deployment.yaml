apiVersion: apps/v1
kind: Deployment
metadata:
  name: yogacara-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: yogacara-agent
  template:
    meta
      labels:
        app: yogacara-agent
    spec:
      containers:
      - name: agent
        image: ghcr.io/your-org/yogacara-agent:latest
        ports:
        - containerPort: 8000
        resources:
          requests: {cpu: "500m", memory: "1Gi"}
          limits: {cpu: "2000m", memory: "4Gi"}
        livenessProbe:
          httpGet: {path: /health, port: 8000}
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet: {path: /health, port: 8000}
          initialDelaySeconds: 5
          periodSeconds: 5
